{% extends 'portfolio/base.html' %}

{% block title %}Contact - My Portfolio{% endblock %}

{% block content %}
<section class="contact">
    <h1>Contact Me</h1>
    <form method="post" class="contact-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Send Message</button>
    </form>
</section>
{% endblock %}
